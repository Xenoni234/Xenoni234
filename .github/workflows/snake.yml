name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"      # Runs daily at midnight UTC
  workflow_dispatch:           # Allows manual trigger from Actions tab
  push:
    branches:
      - main

# ✅ FIX 1: Required so the action can push to the output branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ✅ FIX 2: Updated to v4 (v3 is deprecated)
      - uses: actions/checkout@v4

      # Generate both light + dark snake SVGs
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # ✅ FIX 3: Updated to v4 (v3.1.0 had push permission issues)
      - name: Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
